global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: wine-quality-tf-serving
    metrics_path: /monitoring/prometheus/metrics
    static_configs:
      - targets:
          - localhost:8501

  - job_name: wine-quality-demo-cloud
    scheme: https
    metrics_path: /dicoding-mlops-aqilaziz-final/metrics.txt
    static_configs:
      - targets:
          - aqilaziz.github.io
